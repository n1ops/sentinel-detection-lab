name: Sentinel Validation

on:
  pull_request:
    branches: [main]
    paths:
      - 'detections/**/*.kql'
      - 'playbooks/**/*.json'
      - 'terraform/**/*.tf'

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-kql:
    name: Validate KQL Detections
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Validate KQL metadata and syntax
        run: python scripts/validate_kql.py

  validate-arm:
    name: Validate ARM Templates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate ARM templates
        run: |
          find playbooks -name "azuredeploy.json" -print0 2>/dev/null | while IFS= read -r -d '' template; do
            echo "Validating $template..."
            python -c "
          import json, sys
          try:
              with open(sys.argv[1]) as f:
                  data = json.load(f)
              if '\$schema' not in data:
                  print(f'WARNING: {sys.argv[1]} missing \$schema property')
                  sys.exit(1)
              print(f'  ✓ Valid JSON with ARM schema')
          except json.JSONDecodeError as e:
              print(f'ERROR: {sys.argv[1]} invalid JSON: {e}')
              sys.exit(1)
            " "$template"
          done

  validate-terraform:
    name: Validate Terraform
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.2.0
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Format Check
        working-directory: terraform
        run: terraform fmt -check -recursive
